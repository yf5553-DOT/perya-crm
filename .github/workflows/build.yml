name: Build Windows App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18
        
    - name: Setup Rust
      uses: dtolnay/rust-action@stable
      
    - name: Create icons folder
      run: mkdir -p src-tauri/icons
      
    - name: Download default icons
      run: |
        curl -L -o src-tauri/icons/icon.png "https://raw.githubusercontent.com/tauri-apps/tauri/dev/examples/api/src-tauri/icons/128x128.png"
        copy src-tauri/icons/icon.png src-tauri/icons/icon.ico
      
    - name: Install dependencies
      run: npm install
      
    - name: Build Tauri app
      run: npm run tauri:build
      
    - name: Upload MSI
      uses: actions/upload-artifact@v3
      with:
        name: windows-msi
        path: src-tauri/target/release/bundle/msi/*.msi
        
    - name: Upload EXE
      uses: actions/upload-artifact@v3
      with:
        name: windows-exe
        path: src-tauri/target/release/bundle/nsis/*.exe
