name: Build Windows App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Create icons folder
      run: mkdir -p src-tauri/icons
      
    - name: Create default icon
      run: |
        [System.Reflection.Assembly]::LoadWithPartialName("System.Drawing") | Out-Null
        $bitmap = New-Object System.Drawing.Bitmap(256, 256)
        $graphics = [System.Drawing.Graphics]::FromImage($bitmap)
        $graphics.Clear([System.Drawing.Color]::FromArgb(24, 144, 255))
        $bitmap.Save("src-tauri/icons/icon.png", [System.Drawing.Imaging.ImageFormat]::Png)
        $bitmap.Save("src-tauri/icons/icon.ico", [System.Drawing.Imaging.ImageFormat]::Icon)
      shell: pwsh
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        
    - name: Install Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
      
    - name: Install dependencies
      run: npm install
      
    - name: Build Tauri app
      run: npm run tauri:build
      
    - name: Upload MSI
      uses: actions/upload-artifact@v4
      with:
        name: windows-msi
        path: src-tauri/target/release/bundle/msi/*.msi
        
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: windows-exe
        path: src-tauri/target/release/bundle/nsis/*.exe
